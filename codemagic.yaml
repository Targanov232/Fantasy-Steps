workflows:
  fantasy_step_ios:
    name: Fantasy Step iOS Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze
        script: flutter analyze || true

      - name: Build iOS (no signing)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - your@email.com