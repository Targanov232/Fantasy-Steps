workflows:
  ios_only:
    name: iOS only build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Clean
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Build iOS (no signing)
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app