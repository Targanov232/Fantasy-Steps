name: fantasy_step
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Health / Steps
  health: ^13.3.1

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Storage
  shared_preferences: ^2.3.5

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2
  google_sign_in: ^6.2.2

  # Android intents
  android_intent_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/rewards/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1A1A1A" # 👈 лучше под тёмную тему
  adaptive_icon_foreground: "assets/images/app_icon.png"